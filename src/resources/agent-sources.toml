[defaults]
install_source = "npm_managed"

[agents.codex]
program = "codex"
version_arg = "--version"

[agents.codex.sources.npm_managed]
label = "VibeAround managed npm"
package = "@openai/codex"
[agents.codex.sources.npm_managed.install]
macos = "npm install --global --prefix {managed_npm_prefix} --registry {npm_registry} @openai/codex@latest"
linux = "npm install --global --prefix {managed_npm_prefix} --registry {npm_registry} @openai/codex@latest"
windows = "npm install --global --prefix {managed_npm_prefix} --registry {npm_registry} @openai/codex@latest"
[agents.codex.sources.npm_managed.upgrade]
macos = "npm install --global --prefix {managed_npm_prefix} --registry {npm_registry} @openai/codex@latest"
linux = "npm install --global --prefix {managed_npm_prefix} --registry {npm_registry} @openai/codex@latest"
windows = "npm install --global --prefix {managed_npm_prefix} --registry {npm_registry} @openai/codex@latest"

[agents.codex.sources.npm_global]
label = "npm global"
package = "@openai/codex"
[agents.codex.sources.npm_global.install]
macos = "npm install -g @openai/codex@latest"
linux = "npm install -g @openai/codex@latest"
windows = "npm install -g @openai/codex@latest"
[agents.codex.sources.npm_global.upgrade]
macos = "npm install -g @openai/codex@latest"
linux = "npm install -g @openai/codex@latest"
windows = "npm install -g @openai/codex@latest"

[agents.codex.sources.bun_global]
label = "Bun global"
package = "@openai/codex"
[agents.codex.sources.bun_global.upgrade]
macos = "bun add -g @openai/codex@latest"
linux = "bun add -g @openai/codex@latest"
windows = "bun add -g @openai/codex@latest"

[agents.codex.sources.homebrew_cask]
label = "Homebrew cask"
[agents.codex.sources.homebrew_cask.upgrade]
macos = "brew upgrade --cask codex"

[agents.codex.sources.native]
label = "Native installer"
[agents.codex.sources.native.install]
macos = "curl -fsSL https://chatgpt.com/codex/install.sh | sh"
linux = "curl -fsSL https://chatgpt.com/codex/install.sh | sh"
windows = "powershell -ExecutionPolicy ByPass -c \"irm https://chatgpt.com/codex/install.ps1 | iex\""
[agents.codex.sources.native.upgrade]
macos = "curl -fsSL https://chatgpt.com/codex/install.sh | sh"
linux = "curl -fsSL https://chatgpt.com/codex/install.sh | sh"
windows = "powershell -ExecutionPolicy ByPass -c \"irm https://chatgpt.com/codex/install.ps1 | iex\""

